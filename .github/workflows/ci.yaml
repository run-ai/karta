name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.6'
          cache: true

      - name: Cache bin tools
        uses: actions/cache@v4
        with:
          path: bin
          key: ${{ runner.os }}-bin-${{ hashFiles('Makefile') }}
          restore-keys: |
            ${{ runner.os }}-bin-

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: make test

  validate:
    name: Run validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.6'
          cache: true

      - name: Cache bin tools
        uses: actions/cache@v4
        with:
          path: bin
          key: ${{ runner.os }}-bin-${{ hashFiles('Makefile') }}
          restore-keys: |
            ${{ runner.os }}-bin-

      - name: Download dependencies
        run: go mod download

      - name: Run validation
        run: make validate

