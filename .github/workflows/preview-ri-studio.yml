name: Preview RI Studio (PR)

on:
  pull_request:
    paths:
      - 'docs/ri-studio/**'
      - 'docs/examples/**'
      - 'pkg/**'

jobs:
  build-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: docs/ri-studio/web/package-lock.json

      - name: Build WASM and Static Site
        run: |
          cd docs/ri-studio
          make build-static

      - name: Upload Preview Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ri-studio-preview-pr-${{ github.event.pull_request.number }}
          path: docs/ri-studio/web/dist
          retention-days: 7

      - name: Comment PR with Preview Info
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🚀 RI Studio Preview Build Complete!
              
              **Preview artifact**: \`ri-studio-preview-pr-${{ github.event.pull_request.number }}\`
              
              ### To test locally:
              1. Download the artifact from the Actions tab
              2. Extract it
              3. Run: \`npx serve -p 4173\`
              4. Open: http://localhost:4173
              
              Or wait for merge to main to see it live at the GitHub Pages URL.`
            })
