apiVersion: kai-bolt.runai.ai/v1alpha1
kind: ResourceInterpretationDefinition
metadata:
  name: nimcache
  namespace: kai-bolt-system
  labels:
    workload.type: model-caching
    ai.framework: nim
    example.type: functional
spec:
  structureDefinition:
    rootComponent:
      name: "nimcache"
      # specPath omitted for root component (defaults to .spec)
      kind:
        group: "apps.nvidia.com"
        version: "v1alpha1"
        kind: "NIMCache"
      statusDefinition:
        conditionsDefinition:
          path: ".status.conditions"
          typeFieldName: "type"
          statusFieldName: "status"
        statusMappings:
          initializing:
          - byConditions:
            - type: "NIM_CACHE_PVC_CREATED"
              status: "True"
            - type: "NIM_CACHE_JOB_COMPLETED"
              status: "False"
          running:
          - byConditions:
            - type: "NIM_CACHE_JOB_CREATED"
              status: "True"
            - type: "NIM_CACHE_JOB_COMPLETED"
              status: "False"
          completed:
          - byConditions:
            - type: "NIM_CACHE_JOB_COMPLETED"
              status: "True"
          failed:
          - byConditions:
            - type: "NIM_CACHE_RECONCILE_FAILED"
              status: "True"
    
    # Child resources created but not represented as components
    additionalChildKinds:
    - group: batch
      version: v1
      kind: Job

  # Optimization instructions
  optimizationInstructions:
    # Gang scheduling for cache job coordination (no multi-replica typically)
    gangScheduling:
      podGroups:
      - name: "cache"
        members:
        - componentName: "nimcache"
          groupByKeyPaths:
          - '.metadata.labels["app.kubernetes.io/name"]'

    # Topology awareness for cache storage placement (prefer node affinity for storage)
    topologyAwareness:
      topologyGroups:
      - preferredPlacement: "node"
        members:
        - componentName: "nimcache"
          componentKeyPath: '.metadata.labels["app.kubernetes.io/name"]' 