apiVersion: kai-bolt.runai.ai/v1alpha1
kind: ResourceInterpretationDefinition
metadata:
  name: pytorch
  namespace: kai-bolt-system
  labels:
    workload.type: distributed-training
    ai.framework: pytorch
    example.type: functional
spec:
  structureDefinition:
    rootComponent:
      name: "pytorchjob"
      # specPath omitted for root component (defaults to .spec)
      kind:
        group: "kubeflow.org"
        version: "v1"
        kind: "PyTorchJob"
      statusDefinition:
        conditionsDefinition:
          path: ".status.conditions"
          typeFieldName: "type"
          statusFieldName: "status"
        statusMappings:
          initializing:
          - byConditions:
            - type: "Created"
              status: "True"
            - type: "Running"
              status: "False"
          running:
          - byConditions:
            - type: "Running"
              status: "True"
            - type: "Succeeded"
              status: "False"
            - type: "Failed"
              status: "False"
          completed:
          - byConditions:
            - type: "Succeeded"
              status: "True"
          failed:
          - byConditions:
            - type: "Failed"
              status: "True"

    childComponents:
    - name: "master"
      kind:
        group: ""
        version: "v1"
        kind: "Pod"
      ownerName: "pytorchjob"
      specDefinition:
        podTemplateSpecPath: ".spec.pytorchReplicaSpecs.Master.template"
      scaleDefinition:
        replicasPath: ".spec.pytorchReplicaSpecs.Master.replicas"

    - name: "worker"
      kind:
        group: ""
        version: "v1"
        kind: "Pod"
      ownerName: "pytorchjob"
      specDefinition:
        podTemplateSpecPath: ".spec.pytorchReplicaSpecs.Worker.template"
      scaleDefinition:
        replicasPath: ".spec.pytorchReplicaSpecs.Worker.replicas"
        minReplicasPath: ".spec.elasticPolicy.minReplicas"
        maxReplicasPath: ".spec.elasticPolicy.maxReplicas"

  # Optimization instructions
  optimizationInstructions:
    # Gang scheduling for distributed training coordination
    gangScheduling:
      podGroups:
      - name: "training-gang"
        members:
        - componentName: "master"
          groupByKeyPaths: 
          - '.metadata.labels["training.kubeflow.org/job-name"]'
        - componentName: "worker"
          groupByKeyPaths:
          - '.metadata.labels["training.kubeflow.org/job-name"]'

    # GPU optimization for multi-node training
    gpuInterconnect:
      acceleratedComponents:
      - componentName: "master"
        componentKeyPath: '.metadata.labels["training.kubeflow.org/job-name"]'
        filter: 
        - 'any(.spec.containers[]; (.resources.limits["nvidia.com/gpu"] // 0) > 0)'
      - componentName: "worker"
        componentKeyPath: '.metadata.labels["training.kubeflow.org/job-name"]'
        filter: 
        - 'any(.spec.containers[]; (.resources.limits["nvidia.com/gpu"] // 0) > 0)'

    # Topology awareness for training performance
    topologyAwareness:
      topologyGroups:
      - groupName: "training-cluster"
        preferredPlacement: "zone"
        members:
        - componentName: "master"
          componentKeyPath: '.metadata.labels["training.kubeflow.org/job-name"]'
        - componentName: "worker"
          componentKeyPath: '.metadata.labels["training.kubeflow.org/job-name"]' 