apiVersion: kai-bolt.runai.ai/v1alpha1
kind: ResourceInterface
spec:
  structureDefinition:
    rootComponent:
      name: "pytorchjob"
      # specPath omitted for root component (defaults to .spec)
      kind:
        group: "kubeflow.org"
        version: "v1"
        kind: "PyTorchJob"
      statusDefinition:
        conditionsDefinition:
          path: ".status.conditions"
          typeFieldName: "type"
          statusFieldName: "status"
        statusMappings:
          initializing:
          - byConditions:
            - type: "Created"
              status: "True"
            - type: "Running"
              status: "False"
          running:
          - byConditions:
            - type: "Running"
              status: "True"
            - type: "Succeeded"
              status: "False"
            - type: "Failed"
              status: "False"
          completed:
          - byConditions:
            - type: "Succeeded"
              status: "True"
          failed:
          - byConditions:
            - type: "Failed"
              status: "True"

    childComponents:
    - name: "master"
      kind:
        group: ""
        version: "v1"
        kind: "Pod"
      ownerRef: "pytorchjob"
      specDefinition:
        podTemplateSpecPath: ".spec.pytorchReplicaSpecs.Master.template"
      scaleDefinition:
        replicasPath: ".spec.pytorchReplicaSpecs.Master.replicas"
      podSelector:
        keyPath: '.metadata.labels["training.kubeflow.org/replica-type"]'
        value: "master"

    - name: "worker"
      kind:
        group: ""
        version: "v1"
        kind: "Pod"
      ownerRef: "pytorchjob"
      specDefinition:
        podTemplateSpecPath: ".spec.pytorchReplicaSpecs.Worker.template"
      scaleDefinition:
        replicasPath: ".spec.pytorchReplicaSpecs.Worker.replicas"
        minReplicasPath: ".spec.elasticPolicy.minReplicas"
        maxReplicasPath: ".spec.elasticPolicy.maxReplicas"
      podSelector:
        keyPath: '.metadata.labels["training.kubeflow.org/replica-type"]'
        value: "worker"

  # Optimization instructions
  optimizationInstructions:
    # Gang scheduling for distributed training coordination
    gangScheduling:
      podGroups:
      - name: "job"
        members:
        - componentName: "master"
          groupByKeyPaths: 
          - '.metadata.labels["training.kubeflow.org/job-name"]'
        - componentName: "worker"
          groupByKeyPaths:
          - '.metadata.labels["training.kubeflow.org/job-name"]'

 