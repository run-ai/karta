apiVersion: kai-bolt.runai.ai/v1alpha1
kind: ResourceInterpretationDefinition
metadata:
  name: milvus
  namespace: kai-bolt-system
  labels:
    workload.type: vector-database
    ai.framework: milvus
    example.type: functional
spec:
  structureDefinition:
    rootComponent:
      name: "milvus"
      # specPath omitted for root component (defaults to .spec)
      kind:
        group: "milvus.io"
        version: "v1beta1"
        kind: "Milvus"
      statusDefinition:
        conditionsDefinition:
          path: ".status.conditions"
          typeFieldName: "type"
          statusFieldName: "status"
        statusMappings:
          running:
            byConditions:
            - type: "MilvusReady"
              status: "True"
          failed:
            byConditions:
            - type: "MilvusReady"
              status: "False"

    childComponents:
    # QueryNode - handles vector search queries
    - name: "querynode"
      specPath: ".spec.components.queryNode"
      kind:
        group: "apps"
        version: "v1"
        kind: "StatefulSet"
      ownerName: "milvus"
      childSpecDefinition:
        podTemplateSpecPath: ".spec.components.queryNode.template"
      scaleDefinition:
        replicasPath: ".spec.components.queryNode.replicas"
      statusDefinition:
        conditionsDefinition:
          path: ".status.conditions"
          typeFieldName: "type"
          statusFieldName: "status"
        statusMappings:
          running:
            byConditions:
            - type: "MilvusReady"
              status: "True"
          failed:
            byConditions:
            - type: "MilvusReady"
              status: "False"

    # DataNode - processes and stores vector data
    - name: "datanode"
      specPath: ".spec.components.dataNode"
      kind:
        group: "apps"
        version: "v1"
        kind: "StatefulSet"
      ownerName: "milvus"
      childSpecDefinition:
        podTemplateSpecPath: ".spec.components.dataNode.template"
      scaleDefinition:
        replicasPath: ".spec.components.dataNode.replicas"
      statusDefinition:
        conditionsDefinition:
          path: ".status.conditions"
          typeFieldName: "type"
          statusFieldName: "status"
        statusMappings:
          running:
            byConditions:
            - type: "MilvusReady"
              status: "True"
          failed:
            byConditions:
            - type: "MilvusReady"
              status: "False"

  # Optimization instructions
  optimizationInstructions:
    # Gang scheduling for Milvus component coordination
    gangScheduling:
      podGroups:
      - name: "milvus-cluster"
        members:
        - componentDefinitionName: "querynode"
          componentKeyPath: '.metadata.labels["app.kubernetes.io/instance"]'
        - componentDefinitionName: "datanode"
          componentKeyPath: '.metadata.labels["app.kubernetes.io/instance"]'

    # GPU optimization for vector operations
    gpuInterconnect:
      acceleratedComponents:
      - componentDefinitionName: "querynode"
        componentKeyPath: '.metadata.labels["app.kubernetes.io/name"]'
        filter: 
        - 'any(.spec.containers[]; (.resources.limits["nvidia.com/gpu"] // 0) > 0)'
      - componentDefinitionName: "datanode"
        componentKeyPath: '.metadata.labels["app.kubernetes.io/name"]'
        filter: 
        - 'any(.spec.containers[]; (.resources.limits["nvidia.com/gpu"] // 0) > 0)'

    # Topology awareness for distributed vector operations
    topologyAwareness:
      topologyGroups:
      - groupName: "vector-cluster"
        preferredPlacement: "zone"
        members:
        - componentDefinitionName: "querynode"
          componentKeyPath: '.metadata.labels["app.kubernetes.io/instance"]'
        - componentDefinitionName: "datanode"
          componentKeyPath: '.metadata.labels["app.kubernetes.io/instance"]' 