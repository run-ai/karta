apiVersion: kai-bolt.runai.ai/v1alpha1
kind: ResourceInterpretationDefinition
metadata:
  name: lws
  namespace: kai-bolt-system
  labels:
    workload.type: leader-worker
    ai.framework: leaderworkerset
    example.type: functional
spec:
  structureDefinition:
    rootComponent:
      name: "leaderworkerset"
      # specPath omitted for root component (defaults to .spec)
      kind:
        group: "leaderworkerset.x-k8s.io"
        version: "v1"
        kind: "LeaderWorkerSet"
      statusDefinition:
        conditionsDefinition:
          path: ".status.conditions"
          typeFieldName: "type"
          statusFieldName: "status"
        statusMappings:
          initializing:
          - byConditions:
            - type: "Available"
              status: "False"
            - type: "Progressing"
              status: "False"
            - type: "UpdateInProgress"
              status: "False"
          running:
          - byConditions:
            - type: "Available"
              status: "True"
            - type: "Progressing"
              status: "False"
            - type: "UpdateInProgress"
              status: "False"
          failed:
          - byConditions:
            - type: "Available"
              status: "False"
            - type: "Progressing"
              status: "False"
            - type: "UpdateInProgress"
              status: "False"

    childComponents:
    # Leader - coordinates and manages worker nodes
    - name: "leader"
      kind:
        group: "apps"
        version: "v1"
        kind: "StatefulSet"
      ownerName: "leaderworkerset"
      specDefinition:
        podTemplateSpecPath: ".spec.leaderWorkerTemplate.leaderTemplate.spec.template"

    # Worker group - executes tasks under leader coordination
    - name: "worker"
      kind:
        group: "apps"
        version: "v1"
        kind: "StatefulSet"
      ownerName: "leaderworkerset"
      specDefinition:
        podTemplateSpecPath: ".spec.leaderWorkerTemplate.workerTemplate.spec.template"
      scaleDefinition:
        replicasPath: ".spec.leaderWorkerTemplate.size"

  # Optimization instructions
  optimizationInstructions:
    # Gang scheduling for leader-worker coordination
    # Multi-group pattern: podgroup-lws-{name}-group-{index}
    # Uses default group-index "0" for single-replica LWS
    gangScheduling:
      podGroups:
      - name: "lws-gang"
        members:
        - componentName: "leader"
          groupByKeyPaths:
          - '.metadata.labels["leaderworkerset.sigs.k8s.io/name"]'
          - '.metadata.labels["leaderworkerset.sigs.k8s.io/group-index"] // "0"'
        - componentName: "worker"
          groupByKeyPaths:
          - '.metadata.labels["leaderworkerset.sigs.k8s.io/name"]'
          - '.metadata.labels["leaderworkerset.sigs.k8s.io/group-index"] // "0"'

    # GPU optimization for accelerated workloads
    gpuInterconnect:
      acceleratedComponents:
      - componentName: "leader"
        componentKeyPath: '.metadata.labels["leaderworkerset.sigs.k8s.io/name"]'
        filter: 
        - 'any(.spec.containers[]; (.resources.limits["nvidia.com/gpu"] // 0) > 0)'
      - componentName: "worker"
        componentKeyPath: '.metadata.labels["leaderworkerset.sigs.k8s.io/name"]'
        filter: 
        - 'any(.spec.containers[]; (.resources.limits["nvidia.com/gpu"] // 0) > 0)'

    # Topology awareness for leader-worker placement
    topologyAwareness:
      topologyGroups:
      - groupName: "lws-cluster"
        preferredPlacement: "zone"
        members:
        - componentName: "leader"
          componentKeyPath: '.metadata.labels["leaderworkerset.sigs.k8s.io/name"]'
        - componentName: "worker"
          componentKeyPath: '.metadata.labels["leaderworkerset.sigs.k8s.io/name"]' 