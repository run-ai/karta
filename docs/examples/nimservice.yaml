apiVersion: kai-bolt.runai.ai/v1alpha1
kind: ResourceInterpretationDefinition
metadata:
  name: nimservice
  namespace: kai-bolt-system
  labels:
    workload.type: model-inference
    ai.framework: nim
    example.type: functional
spec:
  structureDefinition:
    rootComponent:
      name: "nimservice"
      # specPath omitted for root component (defaults to .spec)
      kind:
        group: "apps.nvidia.com"
        version: "v1alpha1"
        kind: "NIMService"
      references:
        - componentName: "nimcache-ref"
          componentKeyPath: ".spec.storage.nimCache.name"
      specDefinition:
        fragmentedPodDefinition:
          labelsPath: ".spec.labels"
          annotationsPath: ".spec.annotations"
          resourcesPath: ".spec.resources"
          resourceClaimsPath: ".spec.draResources"
          schedulerNamePath: ".spec.schedulerName"
          podAffinityPath: ".spec.podAffinity"
          priorityClassNamePath: ".spec.priorityClassName"
          imagePath: ".spec.image"
      scaleDefinition:
        replicasPath: ".spec.replicas"
      statusDefinition:
        conditionsDefinition:
          path: ".status.conditions"
          typeFieldName: "type"
          statusFieldName: "status"
        statusMappings:
          initializing:
          - byConditions:
            - type: "NIM_SERVICE_READY"
              status: "False"
            - type: "NIM_SERVICE_FAILED"
              status: "False"
          running:
          - byConditions:
            - type: "NIM_SERVICE_READY"
              status: "True"
            - type: "NIM_SERVICE_FAILED"
              status: "False"
          failed:
          - byConditions:
            - type: "NIM_SERVICE_FAILED"
              status: "True"
            - type: "NIM_SERVICE_READY"
              status: "False"

    # Referenced components - external dependencies
    referencedComponents:
    # NIMCache reference - the pre-cached model that this service uses
    - name: "nimcache-ref"
      # specPath omitted for referenced component (defaults to .spec)
      kind:
        group: "apps.nvidia.com"
        version: "v1alpha1"
        kind: "NIMCache"
    
    # Child resources created but not represented as components
    additionalChildKinds:
    - group: apps
      version: v1
      kind: Deployment
    - group: apps
      version: v1
      kind: StatefulSet
    - group: leaderworkerset.x-k8s.io
      version: v1
      kind: LeaderWorkerSet
    - group: serving.kserve.io
      version: v1beta1
      kind: InferenceService

  # Optimization instructions using new structure
  optimizationInstructions:
    # Gang scheduling for inference pipeline coordination (preferred for serving)
    gangScheduling:
      podGroups:
      - members:
        - componentName: "nimservice"
          groupByKeyPaths:
          - '.metadata.labels["app.kubernetes.io/name"]'

    # GPU optimization for NIM inference
    gpuInterconnect:
      acceleratedComponents:
      - componentName: "nimservice"
        componentKeyPath: '.metadata.labels["nim.nvidia.com/service-name"]'
        filter: 
        - 'any(.spec.containers[]; (.resources.limits["nvidia.com/gpu"] // 0) > 0)'

    # Node-level topology for low-latency inference
    topologyAwareness:
      topologyGroups:
      - preferredPlacement: "node"
        members:
        - componentName: "nimservice"
          componentKeyPath: '.metadata.labels["app.kubernetes.io/name"]' 