apiVersion: kai-bolt.runai.ai/v1alpha1
kind: ResourceInterpretationDefinition
metadata:
  name: kserve
  namespace: kai-bolt-system
  labels:
    workload.type: model-serving
    ai.framework: kserve
    example.type: functional
spec:
  structureDefinition:
    rootComponent:
      name: "inferenceservice"
      # specPath omitted for root component (defaults to .spec)
      kind:
        group: "serving.kserve.io"
        version: "v1beta1"
        kind: "InferenceService"
      statusDefinition:
        conditionsDefinition:
          path: ".status.conditions"
          typeFieldName: "type"
          statusFieldName: "status"
        statusMappings:
          running:
            byConditions:
            - type: "Ready"
              status: "True"
          failed:
            byConditions:
            - type: "Ready"
              status: "False"

    childComponents:
    # Predictor - main inference endpoint
    - name: "predictor"
      specPath: ".spec.predictor"
      kind:
        group: "apps"
        version: "v1"
        kind: "Deployment"
      ownerName: "inferenceservice"
      childSpecDefinition:
        podTemplateSpecPath: ".spec.predictor.template"
      scaleDefinition:
        minReplicasPath: ".spec.predictor.minReplicas"
        maxReplicasPath: ".spec.predictor.maxReplicas"
      statusDefinition:
        conditionsDefinition:
          path: ".status.conditions"
          typeFieldName: "type"
          statusFieldName: "status"
        statusMappings:
          running:
            byConditions:
            - type: "PredictorReady"
              status: "True"
          failed:
            byConditions:
            - type: "PredictorReady"
              status: "False"

    # Transformer - pre/post-processing pipeline
    - name: "transformer"
      specPath: ".spec.transformer"
      kind:
        group: "apps"
        version: "v1"
        kind: "Deployment"
      ownerName: "inferenceservice"
      childSpecDefinition:
        podTemplateSpecPath: ".spec.transformer.template"
      scaleDefinition:
        minReplicasPath: ".spec.transformer.minReplicas"
        maxReplicasPath: ".spec.transformer.maxReplicas"
      statusDefinition:
        conditionsDefinition:
          path: ".status.conditions"
          typeFieldName: "type"
          statusFieldName: "status"
        statusMappings:
          running:
            byConditions:
            - type: "TransformerReady"
              status: "True"
          failed:
            byConditions:
            - type: "TransformerReady"
              status: "False"

  # Optimization instructions
  optimizationInstructions:
    # Gang scheduling for inference pipeline coordination
    gangScheduling:
      podGroups:
      - name: "inference-pipeline"
        members:
        - componentName: "predictor"
          groupByKeyPaths:
          - '.metadata.labels["serving.kserve.io/inferenceservice"]'
        - componentName: "transformer"
          groupByKeyPaths:
          - '.metadata.labels["serving.kserve.io/inferenceservice"]'

    # GPU optimization for inference acceleration  
    gpuInterconnect:
      acceleratedComponents:
      - componentName: "predictor"
        componentKeyPath: '.metadata.labels["serving.kserve.io/inferenceservice"]'
        filter: 
        - 'any(.spec.containers[]; (.resources.limits["nvidia.com/gpu"] // 0) > 0)'
      - componentName: "transformer"
        componentKeyPath: '.metadata.labels["serving.kserve.io/inferenceservice"]'
        filter: 
        - 'any(.spec.containers[]; (.resources.limits["nvidia.com/gpu"] // 0) > 0)'

    # Topology awareness for low-latency serving
    topologyAwareness:
      topologyGroups:
      - groupName: "serving-cluster"
        preferredPlacement: "node"
        members:
        - componentName: "predictor"
          componentKeyPath: '.metadata.labels["serving.kserve.io/inferenceservice"]'
        - componentName: "transformer"
          componentKeyPath: '.metadata.labels["serving.kserve.io/inferenceservice"]' 