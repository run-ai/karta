apiVersion: kai-bolt.runai.ai/v1alpha1
kind: ResourceInterpretationDefinition
spec:
  structureDefinition:
    rootComponent:
      name: "inferenceservice"
      # specPath omitted for root component (defaults to .spec)
      kind:
        group: "serving.kserve.io"
        version: "v1beta1"
        kind: "InferenceService"
      statusDefinition:
        conditionsDefinition:
          path: ".status.conditions"
          typeFieldName: "type"
          statusFieldName: "status"
        statusMappings:
          initializing:
          - byConditions:
            - type: "PredictorConfigurationReady"
              status: "False"
            - type: "PredictorReady"
              status: "False"
            - type: "RoutesReady"
              status: "False"
            - type: "LatestDeploymentReady"
              status: "False"
          running:
          - byConditions:
            - type: "PredictorReady"
              status: "True"
            - type: "RoutesReady"
              status: "True"
            - type: "LatestDeploymentReady"
              status: "True"
          failed:
          - byConditions:
            - type: "PredictorReady"
              status: "False"
            - type: "PredictorConfigurationReady"
              status: "False"
            - type: "RoutesReady"
              status: "False"

    childComponents:
    # Predictor - main inference endpoint
    - name: "predictor"
      kind:
        group: "apps"
        version: "v1"
        kind: "Deployment"
      ownerRef: "inferenceservice"
      specDefinition:
        podTemplateSpecPath: ".spec.predictor.template"
      scaleDefinition:
        minReplicasPath: ".spec.predictor.minReplicas"
        maxReplicasPath: ".spec.predictor.maxReplicas"
      podSelector:
        keyPath: '.metadata.labels["component"]'
        value: "predictor"

    # Transformer - pre/post-processing pipeline
    - name: "transformer"
      kind:
        group: "apps"
        version: "v1"
        kind: "Deployment"
      ownerRef: "inferenceservice"
      specDefinition:
        podTemplateSpecPath: ".spec.transformer.template"
      scaleDefinition:
        minReplicasPath: ".spec.transformer.minReplicas"
        maxReplicasPath: ".spec.transformer.maxReplicas"
      podSelector:
        keyPath: '.metadata.labels["component"]'
        value: "transformer"

  # Optimization instructions
  optimizationInstructions:
    # Gang scheduling for inference pipeline coordination
    gangScheduling:
      podGroups:
      - name: "service"
        members:
        - componentName: "predictor"
          groupByKeyPaths:
          - '.metadata.labels["serving.kserve.io/inferenceservice"]'
        - componentName: "transformer"
          groupByKeyPaths:
          - '.metadata.labels["serving.kserve.io/inferenceservice"]'

 