apiVersion: kai-bolt.runai.ai/v1alpha1
kind: ResourceInterpretationDefinition
metadata:
  name: kserve
  namespace: kai-bolt-system
  labels:
    workload.type: model-serving
    ai.framework: kserve
    example.type: functional
spec:
  # Target KServe inference services
  kind:
    group: serving.kserve.io
    version: v1beta1
    kind: InferenceService
  
  # Component structure - focuses on serverless ML inference
  structureDefinition:
  # Root InferenceService resource
  - name: "inferenceservice"
    specPath: ".spec"
    kind:
      group: "serving.kserve.io"
      version: "v1beta1"
      kind: "InferenceService"
    statusDefinition:
      conditionsDefinition:
        conditionsPath: "status.conditions"
        typeFieldName: "type"
        statusFieldName: "status"
      statusMappings:
        running:
          byConditions:
          - type: "Ready"
            status: "True"
        failed:
          byConditions:
          - type: "Ready"
            status: "False"

  # Predictor - main inference endpoint
  - name: "predictor"
    specPath: ".spec.predictor"
    kind:
      group: "apps"
      version: "v1"
      kind: "Deployment"
    ownerName: "inferenceservice"
    scaleDefinition:
      minReplicasPath: ".minReplicas"
      maxReplicasPath: ".maxReplicas"
    statusDefinition:
      conditionsDefinition:
        conditionsPath: "status.conditions"
        typeFieldName: "type"
        statusFieldName: "status"
      statusMappings:
        running:
          byConditions:
          - type: "PredictorReady"
            status: "True"
        failed:
          byConditions:
          - type: "PredictorReady"
            status: "False"

  # Transformer - pre/post-processing pipeline
  - name: "transformer"
    specPath: ".spec.transformer"
    kind:
      group: "apps"
      version: "v1"
      kind: "Deployment"
    ownerName: "inferenceservice"
    scaleDefinition:
      minReplicasPath: ".minReplicas"
      maxReplicasPath: ".maxReplicas"
    statusDefinition:
      conditionsDefinition:
        conditionsPath: "status.conditions"
        typeFieldName: "type"
        statusFieldName: "status"
      statusMappings:
        running:
          byConditions:
          - type: "TransformerReady"
            status: "True"
        failed:
          byConditions:
          - type: "TransformerReady"
            status: "False"

  # Optimization instructions
  optimizationsInstructions:
    # Gang scheduling for inference pipeline coordination
    gangScheduling:
      podGroups:
      - name: "inference-pipeline"
        members:
        - componentDefinitionName: "predictor"
          componentKeyPath: '.metadata.labels["serving.kserve.io/inferenceservice"]'
        - componentDefinitionName: "transformer"
          componentKeyPath: '.metadata.labels["serving.kserve.io/inferenceservice"]'

    # Multi-node NVLink for GPU-accelerated inference
    multiNodeNVLink:
      acceleratedComponents:
      - componentDefinitionName: "predictor"
        componentKeyPath: '.metadata.labels["serving.kserve.io/inferenceservice"]'
        filter: '(.spec.resources.limits["nvidia.com/gpu"] // 0) > 0'
      - componentDefinitionName: "transformer"
        componentKeyPath: '.metadata.labels["serving.kserve.io/inferenceservice"]'
        filter: '(.spec.resources.limits["nvidia.com/gpu"] // 0) > 0'

    # Topology awareness for low-latency serving
    topologyAwareness:
      topologyGroups:
      - groupName: "serving-cluster"
        preferredPlacement: "node"
        members:
        - componentDefinitionName: "predictor"
          componentKeyPath: '.metadata.labels["serving.kserve.io/inferenceservice"]'
        - componentDefinitionName: "transformer"
          componentKeyPath: '.metadata.labels["serving.kserve.io/inferenceservice"]' 