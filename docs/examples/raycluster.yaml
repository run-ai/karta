apiVersion: kai-bolt.runai.ai/v1alpha1
kind: ResourceInterpretationDefinition
metadata:
  name: raycluster
  namespace: kai-bolt-system
  labels:
    workload.type: distributed-computing
    ai.framework: ray
    example.type: functional
spec:
  structureDefinition:
    rootComponent:
      name: "raycluster"
      # specPath omitted for root component (defaults to .spec)
      kind:
        group: "ray.io"
        version: "v1"
        kind: "RayCluster"
      statusDefinition:
        conditionsDefinition:
          path: ".status.conditions"
          typeFieldName: "type"
          statusFieldName: "status"
        statusMappings:
          initializing:
          - byConditions:
            - type: "RayClusterProvisioned"
              status: "False"
            - type: "HeadPodReady"
              status: "False"
            - type: "ReplicaFailure"
              status: "False"
          running:
          - byConditions:
            - type: "RayClusterProvisioned"
              status: "True"
            - type: "HeadPodReady"
              status: "True"
            - type: "ReplicaFailure"
              status: "False"
          failed:
          - byConditions:
            - type: "ReplicaFailure"
              status: "True"
            - type: "RayClusterProvisioned"
              status: "False"
            - type: "HeadPodReady"
              status: "False"

    childComponents:
    # Head node - Ray cluster coordinator and scheduler
    - name: "head"
      kind:
        group: "apps"
        version: "v1"
        kind: "Deployment"
      ownerName: "raycluster"
      specDefinition:
        podTemplateSpecPath: ".spec.headGroupSpec.template"

    # Worker group - distributed computation nodes
    - name: "worker"
      kind:
        group: "apps"
        version: "v1"
        kind: "Deployment"
      ownerName: "raycluster"
      specDefinition:
        podTemplateSpecPath: ".spec.workerGroupSpecs[].template"
      scaleDefinition:
        replicasPath: ".spec.workerGroupSpecs[].replicas"
        minReplicasPath: ".spec.workerGroupSpecs[].minReplicas"
        maxReplicasPath: ".spec.workerGroupSpecs[].maxReplicas"

  # Optimization instructions
  optimizationInstructions:
    # Gang scheduling for Ray cluster startup coordination
    gangScheduling:
      podGroups:
      - name: "ray-cluster"
        members:
        - componentName: "head"
          groupByKeyPaths:
          - '.metadata.labels["ray.io/cluster"]'
        - componentName: "worker"
          groupByKeyPaths:
          - '.metadata.labels["ray.io/cluster"]'

    # GPU optimization for distributed Ray workloads
    gpuInterconnect:
      acceleratedComponents:
      - componentName: "head"
        componentKeyPath: '.metadata.labels["ray.io/cluster"]'
        filter: 
        - 'any(.spec.containers[]; (.resources.limits["nvidia.com/gpu"] // 0) > 0)'
      - componentName: "worker"
        componentKeyPath: '.metadata.labels["ray.io/cluster"]'
        filter: 
        - 'any(.spec.containers[]; (.resources.limits["nvidia.com/gpu"] // 0) > 0)'

    # Topology awareness for Ray cluster placement
    topologyAwareness:
      topologyGroups:
      - groupName: "ray-computing"
        preferredPlacement: "zone"
        members:
        - componentName: "head"
          componentKeyPath: '.metadata.labels["ray.io/cluster"]'
        - componentName: "worker"
          componentKeyPath: '.metadata.labels["ray.io/cluster"]' 