apiVersion: optimization.nvidia.com/v1alpha1
kind: ResourceInterface
spec:
  structureDefinition:
    rootComponent:
      name: "raycluster"
      # specPath omitted for root component (defaults to .spec)
      kind:
        group: "ray.io"
        version: "v1"
        kind: "RayCluster"
      statusDefinition:
        conditionsDefinition:
          path: ".status.conditions"
          typeFieldName: "type"
          statusFieldName: "status"
        statusMappings:
          initializing:
          - byConditions:
            - type: "RayClusterProvisioned"
              status: "False"
            - type: "HeadPodReady"
              status: "False"
            - type: "ReplicaFailure"
              status: "False"
          running:
          - byConditions:
            - type: "RayClusterProvisioned"
              status: "True"
            - type: "HeadPodReady"
              status: "True"
            - type: "ReplicaFailure"
              status: "False"
          failed:
          - byConditions:
            - type: "ReplicaFailure"
              status: "True"
            - type: "RayClusterProvisioned"
              status: "False"
            - type: "HeadPodReady"
              status: "False"

    childComponents:
    # Head node - Ray cluster coordinator and scheduler
    - name: "head"
      kind:
        group: "apps"
        version: "v1"
        kind: "Deployment"
      ownerRef: "raycluster"
      specDefinition:
        podTemplateSpecPath: ".spec.headGroupSpec.template"
      podSelector:
        componentTypeSelector:
          keyPath: '.metadata.labels["ray.io/node-type"]'
          value: "head"

    # Worker group - distributed computation nodes
    - name: "worker"
      kind:
        group: "apps"
        version: "v1"
        kind: "Deployment"
      ownerRef: "raycluster"
      specDefinition:
        podTemplateSpecPath: ".spec.workerGroupSpecs[].template"
      scaleDefinition:
        replicasPath: ".spec.workerGroupSpecs[].replicas"
        minReplicasPath: ".spec.workerGroupSpecs[].minReplicas"
        maxReplicasPath: ".spec.workerGroupSpecs[].maxReplicas"
      instanceIdPath: ".spec.workerGroupSpecs[].groupName"
      podSelector:
        componentTypeSelector:
          keyPath: '.metadata.labels["ray.io/node-type"]'
          value: "worker"
        componentInstanceSelector:
          idPath: '.metadata.labels["ray.io/group"]'
        

  # Optimization instructions
  optimizationInstructions:
    # Gang scheduling for Ray cluster startup coordination
    gangScheduling:
      podGroups:
      - name: "cluster"
        members:
        - componentName: "head"
          groupByKeyPaths:
          - '.metadata.labels["ray.io/cluster"]'
        - componentName: "worker"
          groupByKeyPaths:
          - '.metadata.labels["ray.io/cluster"]'

 