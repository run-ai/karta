apiVersion: kai-bolt.runai.ai/v1alpha1
kind: ResourceInterpretationDefinition
metadata:
  name: dynamo
  namespace: kai-bolt-system
  labels:
    workload.type: graph-inference
    ai.framework: dynamo
    example.type: functional
spec:
  structureDefinition:
    rootComponent:
      name: "dynamographdeployment"
      # specPath omitted for root component (defaults to .spec)
      kind:
        group: "nvidia.com"
        version: "v1alpha1"
        kind: "DynamoGraphDeployment"
      statusDefinition:
        phaseDefinition:
          path: ".status.state"
        statusMappings:
          initializing:
          - byPhase: "pending"
          running:
          - byPhase: "successful"
          failed:
          - byPhase: "failed"

    childComponents:
    - name: "service"
      kind:
        group: "nvidia.com"
        version: "v1alpha1"
        kind: "DynamoComponentDeployment"
      ownerName: "dynamographdeployment"
      specDefinition:
        fragmentedPodDefinition:
          labelsPath: ".spec.services | .[] | .labels"
          annotationsPath: ".spec.services | .[] | .annotations"
          resourcesPath: ".spec.services | .[] | .resources"
          containersPath: ".spec.services | .[] | .extraPodSpec.containers"
          schedulerNamePath: ".spec.services | .[] | .extraPodSpec.schedulerName"
          nodeAffinityPath: ".spec.services | .[] | .extraPodSpec.affinity.nodeAffinity"
          podAffinityPath: ".spec.services | .[] | .extraPodSpec.affinity.podAffinity"
          priorityClassNamePath: ".spec.services | .[] | .extraPodSpec.priorityClassName"
          imagePath: ".spec.services | .[] | .extraPodSpec.mainContainer.image"
      scaleDefinition:
        replicasPath: ".spec.services | .[] | .replicas"
        minReplicasPath: ".spec.services | .[] | .autoscaling.minReplicas"
        maxReplicasPath: ".spec.services | .[] | .autoscaling.maxReplicas"
    
    # Child resources created but not represented as components
    additionalChildKinds:
    - group: apps
      version: v1
      kind: Deployment
    - group: leaderworkerset.x-k8s.io
      version: v1
      kind: LeaderWorkerSet

  # Optimization instructions
  optimizationInstructions:
    # Gang scheduling for graph service coordination
    gangScheduling:
      podGroups:
      - members:
        - componentName: "service"
          groupByKeyPaths:
          - '.metadata.labels["nvidia.com/dynamo-service"]'

    # GPU optimization for inference acceleration
    gpuInterconnect:
      acceleratedComponents:
      - componentName: "service"
        componentKeyPath: '.metadata.labels["nvidia.com/dynamo-service"]'
        filter: 
        - 'any(.spec.containers[]; (.resources.limits["nvidia.com/gpu"] // 0) > 0)'

    # Topology optimization for inference latency
    topologyAwareness:
      topologyGroups:
      - preferredPlacement: "node"
        members:
        - componentName: "service"
          componentKeyPath: '.metadata.labels["nvidia.com/dynamo-service"]'
          filter: 
          - 'any(.spec.containers[]; (.resources.limits["nvidia.com/gpu"] // 0) > 0)' 