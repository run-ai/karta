apiVersion: kai-bolt.runai.ai/v1alpha1
kind: ResourceInterface
spec:
  structureDefinition:
    rootComponent:
      name: "jobset"
      # specPath omitted for root component (defaults to .spec)
      kind:
        group: "jobset.x-k8s.io"
        version: "v1alpha2"
        kind: "JobSet"
      statusDefinition:
        conditionsDefinition:
          path: ".status.conditions"
          typeFieldName: "type"
          statusFieldName: "status"
        statusMappings:
          initializing:
          - byConditions:
            - type: "StartupPolicyInProgress"
              status: "True"
          running:
          - byConditions:
            - type: "StartupPolicyCompleted"
              status: "True"
            - type: "Completed"
              status: "False"
            - type: "Failed"
              status: "False"
          completed:
          - byConditions:
            - type: "Completed"
              status: "True"
          failed:
          - byConditions:
            - type: "Failed"
              status: "True"

    childComponents:
    # ReplicatedJob - represents the actual Job resources created by JobSet
    - name: "replicatedjob"
      kind:
        group: "batch"
        version: "v1"
        kind: "Job"
      ownerRef: "jobset"
      specDefinition:
        podTemplateSpecPath: ".spec.replicatedJobs[].template"
      scaleDefinition:
        replicasPath: ".spec.replicatedJobs[].replicas"
      instanceIdPath: ".spec.replicatedJobs[].name"
      podSelector:
        componentInstanceSelector:
          idPath: '.metadata.labels["jobset.sigs.k8s.io/replicatedjob-name"]'

  # Optimization instructions
  optimizationInstructions:
    # Gang scheduling for coordinated job execution
    gangScheduling:
      podGroups:
      - name: "job"
        members:
        - componentName: "replicatedjob"
          groupByKeyPaths:
          - '.metadata.labels["jobset.sigs.k8s.io/replicatedjob-name"]'