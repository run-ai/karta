apiVersion: kai-bolt.runai.ai/v1alpha1
kind: ResourceInterpretationDefinition
metadata:
  name: jobset
  namespace: kai-bolt-system
  labels:
    workload.type: batch-processing
    ai.framework: jobset
    example.type: functional
spec:
  # Target JobSet workloads for coordinated batch processing
  topOwnerKind:
    group: jobset.x-k8s.io
    version: v1alpha2
    kind: JobSet
  
  # Component structure - focuses on replicated job management
  structureDefinition:
    components:
  # Root JobSet resource
  - name: "jobset"
    specPath: ".spec"
    kind:
      group: "jobset.x-k8s.io"
      version: "v1alpha2"
      kind: "JobSet"
    statusDefinition:
      conditionsDefinition:
        conditionsPath: ".status.conditions"
        typeFieldName: "type"
        statusFieldName: "status"
      statusMappings:
        running:
          byConditions:
          - type: "JobsReady"
            status: "True"
        completed:
          byConditions:
          - type: "Completed"
            status: "True"
        failed:
          byConditions:
          - type: "Failed"
            status: "True"

  # ReplicatedJob - represents the actual Job resources created by JobSet
  - name: "replicatedjob"
    specPath: ".spec.replicatedJobs[]"
    kind:
      group: "batch"
      version: "v1"
      kind: "Job"
    ownerName: "jobset"
    scaleDefinition:
      replicasPath: ".spec.replicatedJobs[].replicas"
    statusDefinition:
      conditionsDefinition:
        conditionsPath: ".status.conditions"
        typeFieldName: "type"
        statusFieldName: "status"
      statusMappings:
        running:
          byConditions:
          - type: "JobsReady"
            status: "True"
        completed:
          byConditions:
          - type: "Completed"
            status: "True"
        failed:
          byConditions:
          - type: "Failed"
            status: "True"

  # Optimization instructions
  optimizationInstructions:
    # Gang scheduling for coordinated job execution
    gangScheduling:
      podGroups:
      - name: "jobset-gang"
        members:
        - componentDefinitionName: "replicatedjob"
          componentKeyPath: '.metadata.labels["jobset.sigs.k8s.io/jobset-name"]'

    # GPU optimization for distributed training
    gpuInterconnect:
      acceleratedComponents:
      - componentDefinitionName: "replicatedjob"
        componentKeyPath: '.metadata.labels["jobset.sigs.k8s.io/jobset-name"]'
        filter: '(.spec.template.spec.containers[0].resources.limits["nvidia.com/gpu"] // 0) > 0'

    # Topology awareness for batch job placement
    topologyAwareness:
      topologyGroups:
      - groupName: "batch-cluster"
        preferredPlacement: "node"
        members:
        - componentDefinitionName: "replicatedjob"
          componentKeyPath: '.metadata.labels["jobset.sigs.k8s.io/jobset-name"]' 