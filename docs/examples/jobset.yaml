apiVersion: kai-bolt.runai.ai/v1alpha1
kind: ResourceInterpretationDefinition
metadata:
  name: jobset
  namespace: kai-bolt-system
  labels:
    workload.type: batch-processing
    ai.framework: jobset
    example.type: functional
spec:
  structureDefinition:
    rootComponent:
      name: "jobset"
      # specPath omitted for root component (defaults to .spec)
      kind:
        group: "jobset.x-k8s.io"
        version: "v1alpha2"
        kind: "JobSet"
      statusDefinition:
        conditionsDefinition:
          path: ".status.conditions"
          typeFieldName: "type"
          statusFieldName: "status"
        statusMappings:
          initializing:
          - byConditions:
            - type: "StartupPolicyInProgress"
              status: "True"
          running:
          - byConditions:
            - type: "StartupPolicyCompleted"
              status: "True"
            - type: "Completed"
              status: "False"
            - type: "Failed"
              status: "False"
          completed:
          - byConditions:
            - type: "Completed"
              status: "True"
          failed:
          - byConditions:
            - type: "Failed"
              status: "True"

    childComponents:
    # ReplicatedJob - represents the actual Job resources created by JobSet
    - name: "replicatedjob"
      specPath: ".spec.replicatedJobs[]"
      kind:
        group: "batch"
        version: "v1"
        kind: "Job"
      ownerName: "jobset"
      childSpecDefinition:
        podTemplateSpecPath: ".spec.replicatedJobs[].template"
      scaleDefinition:
        replicasPath: ".spec.replicatedJobs[].replicas"

  # Optimization instructions
  optimizationInstructions:
    # Gang scheduling for coordinated job execution
    gangScheduling:
      podGroups:
      - name: "jobset-gang"
        members:
        - componentName: "replicatedjob"
          groupByKeyPaths:
          - '.metadata.labels["jobset.sigs.k8s.io/jobset-name"]'

    # GPU optimization for distributed training
    gpuInterconnect:
      acceleratedComponents:
      - componentName: "replicatedjob"
        componentKeyPath: '.metadata.labels["jobset.sigs.k8s.io/jobset-name"]'
        filter: 
        - 'any(.spec.template.spec.containers[]; (.resources.limits["nvidia.com/gpu"] // 0) > 0)'

    # Topology awareness for batch job placement
    topologyAwareness:
      topologyGroups:
      - groupName: "batch-cluster"
        preferredPlacement: "node"
        members:
        - componentName: "replicatedjob"
          componentKeyPath: '.metadata.labels["jobset.sigs.k8s.io/jobset-name"]' 