apiVersion: kai-bolt.runai.ai/v1alpha1
kind: ResourceInterpretationDefinition
metadata:
  name: mpijob
  namespace: kai-bolt-system
  labels:
    workload.type: distributed-training
    ai.framework: mpi
    example.type: functional
spec:
  structureDefinition:
    rootComponent:
      name: "mpijob"
      # specPath omitted for root component (defaults to .spec)
      kind:
        group: "kubeflow.org"
        version: "v2beta1"
        kind: "MPIJob"
      statusDefinition:
        conditionsDefinition:
          path: ".status.conditions"
          typeFieldName: "type"
          statusFieldName: "status"
        statusMappings:
          running:
            byConditions:
            - type: "Running"
              status: "True"
          completed:
            byConditions:
            - type: "Succeeded"
              status: "True"
          failed:
            byConditions:
            - type: "Failed"
              status: "True"

    childComponents:
    # Launcher node - orchestrates MPI job execution
    - name: "launcher"
      specPath: ".spec.mpiReplicaSpecs.Launcher"
      kind:
        group: ""
        version: "v1"
        kind: "Pod"
      ownerName: "mpijob"
      childSpecDefinition:
        podTemplateSpecPath: ".spec.mpiReplicaSpecs.Launcher.template"
      scaleDefinition:
        replicasPath: ".spec.mpiReplicaSpecs.Launcher.replicas"
      statusDefinition:
        conditionsDefinition:
          path: ".status.conditions"
          typeFieldName: "type"
          statusFieldName: "status"
        statusMappings:
          running:
            byConditions:
            - type: "Running"
              status: "True"
          completed:
            byConditions:
            - type: "Succeeded"
              status: "True"
          failed:
            byConditions:
            - type: "Failed"
              status: "True"

    # Worker nodes - execute MPI tasks under launcher coordination
    - name: "worker"
      specPath: ".spec.mpiReplicaSpecs.Worker"
      kind:
        group: ""
        version: "v1"
        kind: "Pod"
      ownerName: "mpijob"
      childSpecDefinition:
        podTemplateSpecPath: ".spec.mpiReplicaSpecs.Worker.template"
      scaleDefinition:
        replicasPath: ".spec.mpiReplicaSpecs.Worker.replicas"
      statusDefinition:
        conditionsDefinition:
          path: ".status.conditions"
          typeFieldName: "type"
          statusFieldName: "status"
        statusMappings:
          running:
            byConditions:
            - type: "Running"
              status: "True"
          completed:
            byConditions:
            - type: "Succeeded"
              status: "True"
          failed:
            byConditions:
            - type: "Failed"
              status: "True"

  # Optimization instructions
  optimizationInstructions:
    # Gang scheduling for distributed training coordination
    gangScheduling:
      podGroups:
      - name: "training-gang"
        members:
        - componentName: "launcher"
          groupByKeyPaths:
          - '.metadata.labels["training.kubeflow.org/job-name"]'
        - componentName: "worker"
          groupByKeyPaths:
          - '.metadata.labels["training.kubeflow.org/job-name"]'

    # GPU optimization for distributed MPI workloads
    gpuInterconnect:
      acceleratedComponents:
      - componentName: "launcher"
        componentKeyPath: '.metadata.labels["training.kubeflow.org/job-name"]'
        filter: 
        - 'any(.spec.containers[]; (.resources.limits["nvidia.com/gpu"] // 0) > 0)'
      - componentName: "worker"
        componentKeyPath: '.metadata.labels["training.kubeflow.org/job-name"]'
        filter: 
        - 'any(.spec.containers[]; (.resources.limits["nvidia.com/gpu"] // 0) > 0)'

    # Topology awareness for MPI network optimization
    topologyAwareness:
      topologyGroups:
      - groupName: "mpi-cluster"
        preferredPlacement: "zone"
        members:
        - componentName: "launcher"
          componentKeyPath: '.metadata.labels["training.kubeflow.org/job-name"]'
        - componentName: "worker"
          componentKeyPath: '.metadata.labels["training.kubeflow.org/job-name"]'
