apiVersion: kai-bolt.runai.ai/v1alpha1
kind: ResourceInterpretationDefinition
metadata:
  name: knative-serving
  namespace: kai-bolt-system
  labels:
    workload.type: serverless
    ai.framework: knative
    example.type: functional
spec:
  structureDefinition:
    rootComponent:
      name: "service"
      # specPath omitted for root component (defaults to .spec)
      kind:
        group: "serving.knative.dev"
        version: "v1"
        kind: "Service"
      # No childSpecDefinition - service generates revisions, revision is optimization target
      scaleDefinition:
        minReplicasPath: '.spec.template.metadata.annotations["autoscaling.knative.dev/min-scale"]'
        maxReplicasPath: '.spec.template.metadata.annotations["autoscaling.knative.dev/max-scale"]'
      statusDefinition:
        conditionsDefinition:
          path: ".status.conditions"
          typeFieldName: "type"
          statusFieldName: "status"
        statusMappings:
          initializing:
          - byConditions:
            - type: "Ready"
              status: "False"
            - type: "RoutesReady"
              status: "False"
            - type: "ConfigurationsReady"
              status: "False"
          running:
          - byConditions:
            - type: "Ready"
              status: "True"
            - type: "RoutesReady"
              status: "True"
            - type: "ConfigurationsReady"
              status: "True"
          failed:
          - byConditions:
            - type: "Ready"
              status: "False"
            - type: "RoutesReady"
              status: "False"
            - type: "ConfigurationsReady"
              status: "False"

    childComponents:
    - name: "revision"
      # specPath omitted for child component (defaults to .spec)
      ownerName: "service"
      kind:
        group: "serving.knative.dev"
        version: "v1"
        kind: "Revision"
      specDefinition:
        podTemplateSpecPath: ".spec.template"
    
    # Child resources created but not represented as components
    additionalChildKinds:
    - group: apps
      version: v1
      kind: Deployment

  # Optimization instructions
  optimizationInstructions:
    # Gang scheduling for serverless workload coordination
    gangScheduling:
      podGroups:
      - name: "serverless-pipeline"
        members:
        - componentName: "revision"
          groupByKeyPaths:
          - '.metadata.labels["serving.knative.dev/revision"]'

    # GPU optimization for inference workloads
    gpuInterconnect:
      acceleratedComponents:
      - componentName: "revision"
        componentKeyPath: '.metadata.labels["serving.knative.dev/service"]'
        filter: 
        - 'any(.spec.containers[]; (.resources.limits["nvidia.com/gpu"] // 0) > 0)'

    # Topology awareness for serverless placement
    topologyAwareness:
      topologyGroups:
      - groupName: "serverless-cluster"
        preferredPlacement: "node"
        members:
        - componentName: "service"
          componentKeyPath: '.metadata.labels["serving.knative.dev/service"]' 